default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: d1283494cbdb854a9d6bbaa97275575a21d0e9e4
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
        exclude: '^(\.csslintrc|app/node_modules/|app/dist/|node_modules/|dist/)'
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f62a70a3a7114896b062de517d72829ea1c884b6
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@^3.0.0
          - prettier-plugin-organize-imports@^4.3.0
        args:
          - --print-width=120
          - --tab-width=2
          - --use-tabs=false
          - --single-quote
          - --trailing-comma=es5
        exclude: '^(app/dist/|app/coverage/|app/node_modules/|dist/|coverage/|node_modules/)'
        files: '^app/.*\.(css|js|ts|tsx|json|md)$'
  - repo: https://github.com/rhysd/actionlint
    rev: 21e87230c0bac0ffe162da973b80bec9eac35191
    hooks:
      - id: actionlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: 8863af47d64c3681422523e36837957c74d4af4b
    hooks:
      - id: gitleaks
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: b97ae91d8a45eb6f556fe938fa8bd58294c9a5e6
    hooks:
      - id: console-debug-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: console-log-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: console-table-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: react-console-error-detection
      - id: no-console-warn
      - id: ts-unreachable-code
        additional_dependencies:
          - tree-sitter>=0.23
          - tree-sitter-typescript>=0.23
      - id: css-duplicate-property
      - id: import-no-relative-parent
      - id: react-direct-dom
      - id: dockerfile-no-latest
      - id: env-file-check
      - id: yaml-sorter
        exclude: '^(\.github/workflows/|\.github/|changelog/)'
