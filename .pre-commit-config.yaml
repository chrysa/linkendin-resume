---
default_language_version:
  python: python3.13
fail_fast: false
minimum_pre_commit_version: 4.0.1

repos:
  # ─── Debug Detection ──────────────────────────────────────────────────────────
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: 14e42813ca5085a5e07e3c5dd0cfe3c1dc826a5d
    hooks:
      - id: console-debug-detection
        name: Detect console.debug
      - id: console-log-detection
        name: Detect console.log
      - id: console-table-detection
        name: Detect console.table
      - id: yaml-sorter
        name: Sort YAML files
        exclude: '^(\.github/|changelog/)'
      - id: env-file-check
        name: Check .env files for secrets

  # ─── Changelog ───────────────────────────────────────────────────────────────
  - repo: https://github.com/chrysa/pre-commit-hooks-changelog
    rev: v0.1.4
    hooks:
      - id: generate-changelog
        files: 'changelog/.*\.(yaml|yml)$'

  # ─── Code Formatting ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f62a70a3a7114896b062de517d72829ea1c884b6
    hooks:
      - id: prettier
        name: Format code with Prettier
        files: '^app/.*\.(css|js|ts|tsx|json|md)$'
        exclude: '^(app/dist/|app/coverage/|app/node_modules/|dist/|coverage/|node_modules/)'
        args:
          - --print-width=120
          - --tab-width=2
          - --use-tabs=false
          - --single-quote
          - --trailing-comma=es5
        additional_dependencies:
          - prettier@^3.0.0
          - prettier-plugin-organize-imports@^3.2.0

  # ─── CSS Quality ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-csslint
    rev: ad9b0d72db73272bae05948632f13b5cada6f3ef
    hooks:
      - id: csslint
        name: CSS Lint
        files: '^app/src/.*\.css$'
        args: ['--config=.csslintrc']
        additional_dependencies:
          - csslint

  # ─── ESLint for TypeScript/JavaScript ────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.31.0
    hooks:
      - id: eslint
        name: ESLint
        files: '^app/.*\.(ts|tsx|js|jsx)$'
        args: [--fix, --max-warnings=0, --config, app/eslint.config.js]
        additional_dependencies:
          - eslint@^9.37.0
          - '@eslint/js@^9.37.0'
          - globals@^16.0.0
          - '@typescript-eslint/eslint-plugin@^8.0.0'
          - '@typescript-eslint/parser@^8.0.0'
          - eslint-plugin-react@^7.37.0
          - eslint-plugin-react-hooks@^7.0.0
          - eslint-plugin-react-refresh@^0.4.23

  # ─── General File Checks ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: f1dff44d3a9ae852957f34def96390f28719c232
    hooks:
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: check-yaml
        name: Validate YAML
      - id: check-json
        name: Validate JSON
        exclude: '^(app/node_modules/|app/dist/|node_modules/|dist/)'
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']

  # ─── CI/CD Validation ────────────────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: 0bdc95715fa58f64e3fd6e63b0f89be8733cbbab
    hooks:
      - id: actionlint
        name: Lint GitHub Actions

  # ─── Security ────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect secrets
