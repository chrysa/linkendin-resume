default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
        exclude: '^(app/node_modules/|app/dist/|node_modules/|dist/)'
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f62a70a3a7114896b062de517d72829ea1c884b6
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@^3.0.0
          - prettier-plugin-organize-imports@^3.2.0
        args:
          - --print-width=120
          - --tab-width=2
          - --use-tabs=false
          - --single-quote
          - --trailing-comma=es5
        exclude: '^(app/dist/|app/coverage/|app/node_modules/|dist/|coverage/|node_modules/)'
        files: '^app/.*\.(css|js|ts|tsx|json|md)$'
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.1.0
    hooks:
      - id: eslint
        additional_dependencies:
          - '@eslint/js@^9.37.0'
          - '@typescript-eslint/eslint-plugin@^8.0.0'
          - '@typescript-eslint/parser@^8.57.2'
          - eslint@^9.37.0
          - eslint-plugin-react@^7.37.5
          - eslint-plugin-react-hooks@^7.0.1
          - eslint-plugin-react-refresh@^0.5.2
          - globals@^16.0.0
        args: [--fix, --max-warnings=0, --config, app/eslint.config.js]
        files: '^app/.*\.(ts|tsx|js|jsx)$'
  - repo: https://github.com/rhysd/actionlint
    rev: 0f908faf57a36443c34c8354708c7eaeafe706dd
    hooks:
      - id: actionlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: 8863af47d64c3681422523e36837957c74d4af4b
    hooks:
      - id: gitleaks
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: 0.1.0
    hooks:
      - id: console-debug-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: console-log-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: console-table-detection
        files: '\.(js|gs|ts|tsx|jsx)$'
      - id: react-console-error-detection
      - id: no-console-warn
      - id: ts-unreachable-code
        additional_dependencies:
          - tree-sitter>=0.23
          - tree-sitter-typescript>=0.23
      - id: css-duplicate-property
      - id: css-unused-variable
      - id: import-no-relative-parent
      - id: react-direct-dom
      - id: dockerfile-no-latest
      - id: env-file-check
      - id: yaml-sorter
        exclude: '^(\.github/|changelog/)'

