---
# Single compose file — COMPOSE_PROFILES drives the active environment.
#
# Local dev:   COMPOSE_PROFILES=dev  docker compose up --watch
# Production:  COMPOSE_PROFILES=prod docker compose up -d
#
# Tip: set COMPOSE_PROFILES in your .env so you never have to type it.

x-healthcheck-dev: &healthcheck-dev
  test: ['CMD-SHELL', 'wget -qO- http://0.0.0.0:${APP_PORT:-3000} || exit 1']
  interval: 10s
  timeout: 3s
  retries: 10

x-healthcheck-prod: &healthcheck-prod
  test: ['CMD-SHELL', 'wget -qO- http://0.0.0.0:${APP_PORT:-3000} || exit 1']
  interval: 30s
  timeout: 5s
  retries: 3

networks:
  resume:
    name: resume_resume
  traefik-public:
    external: true

volumes:
  node_modules:

services:

  # --- Development ------------------------------------------------------------
  resume:
    profiles: [dev]
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: resume-dev
    image: resume:dev
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./src
          target: /srv/app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./cv.json
          target: /srv/app/cv.json
        - action: restart
          path: .env
        - action: rebuild
          path: package.json
        - action: rebuild
          path: docker/Dockerfile
    healthcheck: *healthcheck-dev
    ports:
      - '${APP_PORT:-3000}:${APP_PORT:-3000}'
    volumes:
      - type: bind
        source: ./
        target: /srv/app/
      - type: volume
        source: node_modules
        target: /srv/app/node_modules
    tty: true
    networks:
      - resume

  # --- Production -------------------------------------------------------------
  resume-prod:
    profiles: [prod]
    image: ${IMAGE:-ghcr.io/chrysa/resume}:${IMAGE_TAG:-latest}
    container_name: resume-prod
    restart: unless-stopped
    env_file:
      - .env
    healthcheck: *healthcheck-prod
    networks:
      - traefik-public
      - resume
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.resume.rule=Host(`${APP_DOMAIN:-resume.chrysa.dev}`)'
      - 'traefik.http.routers.resume.entrypoints=websecure'
      - 'traefik.http.routers.resume.tls=true'
      - 'traefik.http.routers.resume.tls.certresolver=letsencrypt'
      - 'traefik.http.services.resume.loadbalancer.server.port=${APP_PORT:-3000}'
      - 'traefik.http.routers.resume-http.rule=Host(`${APP_DOMAIN:-resume.chrysa.dev}`)'
      - 'traefik.http.routers.resume-http.entrypoints=web'
      - 'traefik.http.routers.resume-http.middlewares=redirect-to-https'
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https'
