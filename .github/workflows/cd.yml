---
name: CD

on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
    release:
        name: Release (GitVersion + Tag)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        outputs:
            semver: ${{ steps.gitversion.outputs.fullSemVer }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Compute version
              id: gitversion
              uses: chrysa/github-actions/gitversion@main
            - name: Create tag
              if: github.ref == 'refs/heads/main'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="v${{ steps.gitversion.outputs.fullSemVer }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -f "$VERSION"
                  git push origin "$VERSION" --force
              shell: bash
            - name: Create GitHub release
              if: startsWith(github.ref, 'refs/tags/v')
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                      --title "Release ${{ github.ref_name }}" \
                      --generate-notes
              shell: bash

    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs:
            - release
        env:
            REGISTRY: ghcr.io
            IMAGE: ghcr.io/chrysa/linkendin-resume
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/Dockerfile
                  target: prod
                  push: true
                  tags: |
                      ${{ env.IMAGE }}:latest
                      ${{ env.IMAGE }}:${{ needs.release.outputs.semver }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Deploy to server via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  script: |
                      cd /srv/resume
                      COMPOSE_PROFILES=prod docker compose pull
                      COMPOSE_PROFILES=prod docker compose up -d --remove-orphans
                      docker image prune -f
