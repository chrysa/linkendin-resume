---
name: GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    id-token: write
    pages: write

concurrency:
    cancel-in-progress: false
    group: pages

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            VITE_BASE_URL: https://resume.chrysa.dev
            VITE_GITHUB_ISSUES_URL: https://github.com/chrysa/linkendin-resume/issues/new/choose
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: npm
                  cache-dependency-path: app/package-lock.json
                  node-version: '24'
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Install dependencies
              run: npm ci
              shell: bash
              working-directory: app
            - name: Build
              run: npm run build
              shell: bash
              working-directory: app
            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: app/dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
