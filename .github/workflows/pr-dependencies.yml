---
name: Check PR dependencies

on:
  pull_request:
    branches-ignore:
      - develop
      - main
      - master
    types:
      - auto_merge_enabled
      - opened
      - ready_for_review
      - reopened
      - synchronize
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  call:
    uses: chrysa/github-actions/.github/workflows/dependencies.yml@main
    secrets: inherit
