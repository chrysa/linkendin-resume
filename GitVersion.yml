assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
mode: Mainline
branches:
  feature:
    increment: Minor
    regex: ^features?[/-]
    source-branches:
      - main
    tag: alpha
  fix:
    increment: Patch
    regex: ^(bugfix|hotfix|fix)[/-]
    source-branches:
      - main
    tag: beta
  main:
    increment: Patch
    is-mainline: true
    prevent-increment-of-merged-branch-version: true
    regex: ^main$
    tag: ''
    track-merge-target: false
  release:
    increment: Minor
    prevent-increment-of-merged-branch-version: true
    regex: ^releases?[/-]
    source-branches:
      - main
    tag: rc
    track-merge-target: true
commit-message-incrementing: Enabled
ignore:
  sha: []
major-version-bump-message: '^(feat|fix|refactor|perf)(\(.+\))?!:|^BREAKING CHANGE'
minor-version-bump-message: '^feat(\(.+\))?:'
patch-version-bump-message: '^(fix|perf|refactor)(\(.+\))?:'
