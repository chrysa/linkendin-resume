updates:
- assignees:
  - chrysa
  commit-message:
    prefix: '[SKIP CI] [GA] '
  cooldown:
    default-days: 7
  directory: .github/workflows/
  groups:
    actions-official:
      patterns:
      - actions/*
    community-actions:
      patterns:
      - '*'
    peter-evans:
      patterns:
      - peter-evans/*
  labels:
  - skip-ci
  - dependencies
  - Ci
  open-pull-requests-limit: 8
  package-ecosystem: github-actions
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[SKIP CI] [pre-commit] '
  directory: /
  labels:
  - skip-ci
  - dependencies
  - Pre-commit
  open-pull-requests-limit: 2
  package-ecosystem: pre-commit
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[npm] '
  cooldown:
    default-days: 7
  directory: app/
  groups:
    build-tools:
      patterns:
      - vite
      - '@vitejs/*'
      - typescript
      - '@typescript-eslint/*'
      - eslint*
    react-ecosystem:
      patterns:
      - react
      - react-*
      - '@types/react*'
    testing:
      patterns:
      - vitest
      - '@testing-library/*'
      - jest*
  labels:
  - dependencies
  - JavaScript
  open-pull-requests-limit: 10
  package-ecosystem: npm
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[docker] '
  directory: docker/
  labels:
  - dependencies
  - Docker
  open-pull-requests-limit: 5
  package-ecosystem: docker
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[SKIP CI] [docker-compose] '
  directory: /
  labels:
  - skip-ci
  - dependencies
  - Docker
  open-pull-requests-limit: 5
  package-ecosystem: docker-compose
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
version: 2
